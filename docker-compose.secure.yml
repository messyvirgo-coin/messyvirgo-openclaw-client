services:
  openclaw-gateway:
    # Hardening
    read_only: true
    # Workaround: on some Linux Docker setups, `init: true` + hardening can
    # fail to exec `/sbin/docker-init` (crash-loop). The gateway works without it.
    init: false
    tmpfs:
      - /tmp
      - /run
      - /var/tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    # Reasonable resource limits (tune if needed)
    pids_limit: 4096
    mem_limit: 4g
    cpus: 2.0
    ulimits:
      nofile:
        soft: 4096
        hard: 8192

  openclaw-cli:
    read_only: true
    init: false
    tmpfs:
      - /tmp
      - /run
      - /var/tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
